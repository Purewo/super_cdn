          default: active
    AssetBucket:
      type: object
      properties:
        slug:
          type: string
        workspace_id:
          type: string
        name:
          type: string
        description:
          type: string
        route_profile:
          type: string
        routing_policy:
          type: string
        allowed_types:
          type: array
          items:
            type: string
        max_capacity_bytes:
          type: integer
          format: int64
        max_file_size_bytes:
          type: integer
          format: int64
        status:
          type: string
      additionalProperties: true
    BucketObject:
      type: object
      properties:
        bucket_slug:
          type: string
        logical_path:
          type: string
        object_id:
          type: integer
          format: int64
        url:
          type: string
        size:
          type: integer
          format: int64
        content_type:
          type: string
      additionalProperties: true
    BucketUploadResponse:
      type: object
      required: [bucket, object, bucket_object, jobs, url, public_url]
      properties:
        bucket:
          type: string
