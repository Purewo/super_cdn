        route:
          $ref: "#/components/schemas/RouteExplainResponse"
        expected_edge_headers:
          type: object
          additionalProperties:
            type: string
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DoctorCheck"
        warnings:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
