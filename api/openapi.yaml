openapi: 3.1.0
info:
  title: Super CDN Control Plane API
  version: 0.4.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    First formal contract for the stable Super CDN operator API.
    This file describes the current v0.4.0-era behavior for the CLI-facing
    control plane: auth, diagnostics, asset buckets, site deployments, edge
    manifests, and conservative garbage collection.

    Root-only provider provisioning, legacy low-level object repair, and init
    endpoints remain documented in docs/cli-reference.md until their contracts
    are frozen.
servers:
  - url: http://127.0.0.1:8080
    description: Local development server
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Invite, login, user and token management.
  - name: Diagnostics
    description: Operator support reports, route checks and provider status.
  - name: Audit
    description: Workspace-scoped mutation audit events.
  - name: Asset Buckets
    description: Static asset bucket creation, object upload, warmup, purge and diagnostics.
  - name: Sites
    description: Site metadata, domains, DNS, deployment target resolution and site diagnostics.
  - name: Deployments
    description: Site deployment records, promotion, deletion and deployment-scoped cache operations.
  - name: Edge Manifest
    description: Edge manifest export, route explanation and Workers KV publication.
  - name: Garbage Collection
    description: Conservative cleanup entry points for staging and tracked deployment metadata.
paths:
  "/api/v1/auth/accept-invite":
    post:
      tags: [Auth]
      operationId: acceptInvite
      summary: Accept an invite and issue a user API token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
      responses:
        "201":
          description: User and API token were created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/auth/me":
    get:
      tags: [Auth]
      operationId: getCurrentPrincipal
      summary: Read the current token identity
      responses:
        "200":
          description: Current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPrincipal"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/api/v1/auth/invites":
    post:
      tags: [Auth]
      operationId: createInvite
      summary: Create a one-time invite token
      description: Owner-only for user tokens; root tokens can also call it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  "/api/v1/users":
    get:
      tags: [Auth]
      operationId: listUsers
      summary: List users in the current workspace
      description: Owner-only for user tokens; root tokens can also call it.
      responses:
        "200":
          description: Workspace users.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"
  "/api/v1/users/{id}/tokens":
    post:
      tags: [Auth]
      operationId: createUserToken
      summary: Create an API token for a workspace user
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  default: manual
      responses:
        "201":
          description: API token was created.
          content:
            application/json:
              schema:
                type: object
                required: [api_token, token]
                properties:
                  api_token:
                    type: string
                  token:
                    $ref: "#/components/schemas/APIToken"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/tokens/{id}":
    delete:
      tags: [Auth]
      operationId: revokeToken
      summary: Revoke an API token
      parameters:
        - $ref: "#/components/parameters/TokenID"
      responses:
        "200":
          description: Token was revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status, token_id]
                properties:
                  status:
                    type: string
                    example: ok
                  token_id:
                    type: string
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/doctor":
    get:
      tags: [Diagnostics]
      operationId: getDoctorReport
      summary: Run the control-plane support report
      parameters:
        - name: resources
          in: query
          schema:
            type: boolean
            default: true
        - name: routing
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Diagnostic report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorReport"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/audit-events":
    get:
      tags: [Audit]
      operationId: listAuditEvents
      summary: List mutation audit events
      description: Root can query all workspaces or a selected workspace; owner and maintainer tokens are scoped to their own workspace.
      parameters:
        - name: workspace_id
          in: query
          schema:
            type: string
          description: Root-only workspace filter.
        - name: action
          in: query
          schema:
            type: string
          description: Exact action filter.
        - name: resource
          in: query
          schema:
            type: string
          description: Resource substring filter.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Audit events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  "/api/v1/asset-buckets":
    get:
      tags: [Asset Buckets]
      operationId: listAssetBuckets
      summary: List asset buckets visible to the current principal
      responses:
        "200":
          description: Asset buckets.
          content:
            application/json:
              schema:
                type: object
                required: [buckets]
                properties:
                  buckets:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssetBucket"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Asset Buckets]
      operationId: createAssetBucket
      summary: Create an asset bucket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetBucketRequest"
      responses:
        "201":
          description: Asset bucket was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetBucket"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/asset-buckets/{slug}":
    get:
      tags: [Asset Buckets]
      operationId: getAssetBucket
      summary: Read an asset bucket
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      responses:
        "200":
          description: Asset bucket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetBucket"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Asset Buckets]
      operationId: deleteAssetBucket
      summary: Delete an asset bucket
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
        - name: force
          in: query
          schema:
            type: boolean
            default: false
        - name: delete_objects
          in: query
          schema:
            type: boolean
            default: false
        - name: delete_remote
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Bucket deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssetBucketResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/asset-buckets/{slug}/doctor":
    get:
      tags: [Diagnostics]
      operationId: getAssetBucketDoctor
      summary: Diagnose an asset-bucket path and delivery route
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
        - name: path
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: client_ip
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Diagnostic report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CDNDoctorReport"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/asset-buckets/{slug}/init":
    post:
      tags: [Asset Buckets]
      operationId: initAssetBucket
      summary: Create remote bucket directories where supported
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Init result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyObject"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/asset-buckets/{slug}/objects":
    get:
      tags: [Asset Buckets]
      operationId: listAssetBucketObjects
      summary: List objects in an asset bucket
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
        - name: prefix
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Bucket objects.
          content:
            application/json:
              schema:
                type: object
                required: [objects]
                properties:
                  objects:
                    type: array
                    items:
                      $ref: "#/components/schemas/BucketObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Asset Buckets]
      operationId: uploadAssetBucketObject
      summary: Upload one file into an asset bucket
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, path]
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                asset_type:
                  type: string
                cache_control:
                  type: string
      responses:
        "201":
          description: Uploaded object and replication jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    delete:
      tags: [Asset Buckets]
      operationId: deleteAssetBucketObjects
      summary: Delete one or more objects from an asset bucket
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
        - name: path
          in: query
          schema:
            type: string
        - name: paths
          in: query
          schema:
            type: string
          description: Comma-separated object paths.
        - name: prefix
          in: query
          schema:
            type: string
        - name: all
          in: query
          schema:
            type: boolean
            default: false
        - name: force
          in: query
          schema:
            type: boolean
            default: false
        - name: delete_remote
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Object deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBucketObjectsResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/asset-buckets/{slug}/objects/primary-target":
    post:
      tags: [Asset Buckets]
      operationId: switchAssetBucketObjectPrimaryTarget
      summary: Switch one bucket object's primary delivery target after explicit confirmation
      description: Refuses buckets that use routing_policy, because primary_target metadata would not control policy-based live routing.
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrimaryTargetSwitchRequest"
      responses:
        "200":
          description: Switch plan or applied result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimaryTargetSwitchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/asset-buckets/{slug}/purge":
    post:
      tags: [Asset Buckets]
      operationId: purgeAssetBucketCache
      summary: Purge CDN cache for bucket URLs
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/URLSelectionRequest"
      responses:
        "200":
          description: Purge result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/asset-buckets/{slug}/warmup":
    post:
      tags: [Asset Buckets]
      operationId: warmupAssetBucket
      summary: Warm CDN cache for bucket URLs
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/URLSelectionRequest"
      responses:
        "200":
          description: Warmup result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/asset-buckets/{slug}/replicas/refresh":
    post:
      tags: [Asset Buckets]
      operationId: refreshAssetBucketReplicas
      summary: Refresh storage replicas for selected bucket objects
      parameters:
        - $ref: "#/components/parameters/BucketSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplicaRefreshRequest"
      responses:
        "200":
          description: Refresh result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicaRefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/sites":
    get:
      tags: [Sites]
      operationId: listSites
      summary: List sites visible to the current principal
      responses:
        "200":
          description: Sites.
          content:
            application/json:
              schema:
                type: object
                required: [sites]
                properties:
                  sites:
                    type: array
                    items:
                      $ref: "#/components/schemas/Site"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Sites]
      operationId: createSite
      summary: Create a site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteRequest"
      responses:
        "200":
          description: Site was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/sites/{id}":
    delete:
      tags: [Sites]
      operationId: deleteSite
      summary: Delete a site and tracked resources
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - name: force
          in: query
          required: true
          schema:
            type: boolean
        - name: delete_remote
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Site deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/offline":
    post:
      tags: [Sites]
      operationId: offlineSite
      summary: Mark a site offline
      parameters:
        - $ref: "#/components/parameters/SiteID"
      responses:
        "200":
          description: Updated site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/online":
    post:
      tags: [Sites]
      operationId: onlineSite
      summary: Mark a site active
      parameters:
        - $ref: "#/components/parameters/SiteID"
      responses:
        "200":
          description: Updated site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/domains":
    post:
      tags: [Sites]
      operationId: bindSiteDomains
      summary: Bind domains to a site
      parameters:
        - $ref: "#/components/parameters/SiteID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindSiteDomainsRequest"
      responses:
        "200":
          description: Updated site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/sites/{id}/deployment-target":
    get:
      tags: [Sites]
      operationId: resolveSiteDeploymentTarget
      summary: Resolve the effective deployment target for a site
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - name: route_profile
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Deployment target decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeploymentTarget"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/doctor":
    get:
      tags: [Diagnostics]
      operationId: getSiteDoctor
      summary: Diagnose a site path and delivery route
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - name: path
          in: query
          schema:
            type: string
        - name: deployment
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: client_ip
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Diagnostic report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDoctorReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/purge":
    post:
      tags: [Sites]
      operationId: purgeSiteCache
      summary: Purge cache for the active site deployment
      parameters:
        - $ref: "#/components/parameters/SiteID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/URLSelectionRequest"
      responses:
        "200":
          description: Purge result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/route-explain":
    get:
      tags: [Edge Manifest]
      operationId: explainSiteRoute
      summary: Explain how a site path is routed
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - name: deployment
          in: query
          schema:
            type: string
        - name: path
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: client_ip
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Route explanation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteExplainResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/files/primary-target":
    post:
      tags: [Deployments]
      operationId: switchActiveSiteFilePrimaryTarget
      summary: Switch one file in the active site deployment to a ready primary target
      description: Refuses deployments that use routing_policy, resource_failover or Cloudflare Static when primary_target metadata would not control live traffic.
      parameters:
        - $ref: "#/components/parameters/SiteID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrimaryTargetSwitchRequest"
      responses:
        "200":
          description: Switch plan or applied result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimaryTargetSwitchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/sites/{id}/deployments":
    get:
      tags: [Deployments]
      operationId: listSiteDeployments
      summary: List deployments for a site
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Deployments.
          content:
            application/json:
              schema:
                type: object
                required: [deployments]
                properties:
                  deployments:
                    type: array
                    items:
                      $ref: "#/components/schemas/SiteDeployment"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Deployments]
      operationId: createSiteDeployment
      summary: Upload a zip artifact and queue a site deployment
      parameters:
        - $ref: "#/components/parameters/SiteID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [artifact]
              properties:
                artifact:
                  type: string
                  format: binary
                environment:
                  type: string
                  enum: [production, preview]
                  default: preview
                promote:
                  type: boolean
                  default: false
                pinned:
                  type: boolean
                  default: false
                route_profile:
                  type: string
                deployment_target:
                  type: string
                target:
                  type: string
                  description: Alias for deployment_target.
                routing_policy:
                  type: string
                resource_failover:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Deployment was queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedDeploymentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/sites/{id}/cloudflare-static/deployments":
    post:
      tags: [Deployments]
      operationId: recordCloudflareStaticDeployment
      summary: Record a Cloudflare Static deployment created by the CLI
      parameters:
        - $ref: "#/components/parameters/SiteID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordCloudflareStaticDeploymentRequest"
      responses:
        "201":
          description: Recorded deployment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeployment"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/sites/{id}/cloudflare-static/recoveries":
    post:
      tags: [Deployments]
      operationId: recoverCloudflareStaticDeployment
      summary: Recover a verified Cloudflare Static provider write into Super CDN metadata
      description: Records an inactive Cloudflare Static deployment only when the caller supplies explicit recovery confirmation and strict provider evidence. Activation is intentionally not supported by this endpoint.
      parameters:
        - $ref: "#/components/parameters/SiteID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoverCloudflareStaticDeploymentRequest"
      responses:
        "201":
          description: Recovered deployment metadata was recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeployment"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/sites/{id}/deployments/{deployment}":
    get:
      tags: [Deployments]
      operationId: getSiteDeployment
      summary: Read a site deployment
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      responses:
        "200":
          description: Deployment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeployment"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Deployments]
      operationId: deleteSiteDeployment
      summary: Delete a non-active, unpinned deployment
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
        - name: delete_objects
          in: query
          schema:
            type: boolean
            default: false
        - name: delete_remote
          in: query
          schema:
            type: boolean
            default: true
        - name: dry_run
          in: query
          description: Return a deletion safety plan without deleting metadata or remote objects.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Deletion result, or a dry-run safety plan when dry_run=true.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeploymentDeleteResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/sites/{id}/deployments/{deployment}/cloudflare-static/activate":
    post:
      tags: [Deployments]
      operationId: activateCloudflareStaticDeployment
      summary: Activate a recovered Cloudflare Static deployment after provider verification
      description: Dedicated provider-aware activation path for recovered Cloudflare Static deployments. The caller must provide explicit confirmation plus strict probe/source/provider evidence matching the recorded deployment; generic metadata-only promote remains blocked.
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateCloudflareStaticDeploymentRequest"
      responses:
        "200":
          description: Activated deployment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeployment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/deployments/{deployment}/files/primary-target":
    post:
      tags: [Deployments]
      operationId: switchSiteDeploymentFilePrimaryTarget
      summary: Switch one file in a specific site deployment to a ready primary target
      description: Refuses deployments that use routing_policy, resource_failover or Cloudflare Static when primary_target metadata would not control live traffic.
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrimaryTargetSwitchRequest"
      responses:
        "200":
          description: Switch plan or applied result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimaryTargetSwitchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/sites/{id}/deployments/{deployment}/promote":
    post:
      tags: [Deployments]
      operationId: promoteSiteDeployment
      summary: Promote a ready deployment to active
      description: Metadata-only promotion is allowed for origin-assisted deployments. Non-active cloudflare_static and hybrid_edge deployments are rejected because their real traffic state also depends on Cloudflare Worker assets and/or active KV manifests.
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      responses:
        "200":
          description: Active deployment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeployment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  "/api/v1/sites/{id}/deployments/{deployment}/purge":
    post:
      tags: [Deployments]
      operationId: purgeSiteDeploymentCache
      summary: Purge cache for one site deployment
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/URLSelectionRequest"
      responses:
        "200":
          description: Purge result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URLActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/deployments/{deployment}/edge-manifest":
    get:
      tags: [Edge Manifest]
      operationId: exportSiteEdgeManifest
      summary: Export a deployment edge manifest
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      responses:
        "200":
          description: Edge manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeManifest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/sites/{id}/deployments/{deployment}/edge-manifest/publish":
    post:
      tags: [Edge Manifest]
      operationId: publishSiteEdgeManifest
      summary: Publish an edge manifest to Cloudflare KV
      parameters:
        - $ref: "#/components/parameters/SiteID"
        - $ref: "#/components/parameters/DeploymentID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishEdgeManifestRequest"
      responses:
        "200":
          description: Publish result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishEdgeManifestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  "/api/v1/sites/{id}/gc":
    post:
      tags: [Garbage Collection]
      operationId: runSiteGC
      summary: Report site GC status for the current version
      parameters:
        - $ref: "#/components/parameters/SiteID"
      responses:
        "200":
          description: No-op site GC status.
          content:
            application/json:
              schema:
                type: object
                required: [site_id, status, message]
                properties:
                  site_id:
                    type: string
                  status:
                    type: string
                    example: noop
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
  "/api/v1/gc":
    post:
      tags: [Garbage Collection]
      operationId: runManualGC
      summary: Run conservative local staging garbage collection
      description: Root-only endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GCRequest"
      responses:
        "200":
          description: GC result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GCResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SuperCDN token
  parameters:
    BucketSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    DeploymentID:
      name: deployment
      in: path
      required: true
      schema:
        type: string
    SiteID:
      name: id
      in: path
      required: true
      schema:
        type: string
    TokenID:
      name: id
      in: path
      required: true
      schema:
        type: string
    UserID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Token is valid but does not have permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found or is not visible to the token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state prevents the requested operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    AnyObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    AcceptInviteRequest:
      type: object
      required: [invite_token]
      properties:
        invite_token:
          type: string
        token_name:
          type: string
    AcceptInviteResponse:
      type: object
      required: [user, api_token, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        api_token:
          type: string
        token:
          $ref: "#/components/schemas/APIToken"
    CreateInviteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        role:
          type: string
          enum: [owner, maintainer, viewer]
          default: viewer
        expires_in_seconds:
          type: integer
          format: int64
          default: 604800
    CreateInviteResponse:
      type: object
      required: [invite, invite_token]
      properties:
        invite:
          $ref: "#/components/schemas/Invite"
        invite_token:
          type: string
    AuthPrincipal:
      type: object
      properties:
        root:
          type: boolean
        user_id:
          type: integer
          format: int64
        user_name:
          type: string
        workspace_id:
          type: string
        role:
          type: string
          enum: [owner, maintainer, viewer]
        token_id:
          type: string
      additionalProperties: true
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workspace_id:
          type: string
        name:
          type: string
        role:
          type: string
      additionalProperties: true
    Invite:
      type: object
      properties:
        id:
          type: string
        workspace_id:
          type: string
        name:
          type: string
        role:
          type: string
        expires_at:
          type: string
          format: date-time
      additionalProperties: true
    APIToken:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: integer
          format: int64
        workspace_id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
      additionalProperties: true
    AuditEvent:
      type: object
      required: [id, workspace_id, action, resource, created_at]
      properties:
        id:
          type: integer
          format: int64
        workspace_id:
          type: string
        user_id:
          type: integer
          format: int64
        action:
          type: string
        resource:
          type: string
        created_at:
          type: string
          format: date-time
    AuditEventsResponse:
      type: object
      required: [events, limit]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        limit:
          type: integer
          minimum: 1
          maximum: 1000
    DoctorReport:
      type: object
      required: [status, checked_at_utc, auth, server, checks]
      properties:
        status:
          type: string
        checked_at_utc:
          type: string
          format: date-time
        auth:
          $ref: "#/components/schemas/AuthPrincipal"
        server:
          type: object
          additionalProperties: true
        checks:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
              message:
                type: string
              error:
                type: string
        resource_libraries:
          type: array
          items:
            $ref: "#/components/schemas/AnyObject"
        routing_policies:
          type: array
          items:
            $ref: "#/components/schemas/AnyObject"
        warnings:
          type: array
          items:
            type: string
        next_commands:
          type: array
          items:
            type: string
    DoctorCheck:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ok, warning, error, skipped]
        message:
          type: string
        error:
          type: string
    DoctorRecommendation:
      type: object
      required: [action, level, summary]
      properties:
        action:
          type: string
        level:
          type: string
          enum: [info, warning, error]
        summary:
          type: string
        reason:
          type: string
        command:
          type: string
    PrimaryTargetSwitchRequest:
      type: object
      required: [path, target]
      properties:
        path:
          type: string
          description: Bucket logical path or site request path.
        target:
          type: string
          description: Ready replica target to make primary.
        expected_current_target:
          type: string
          description: Optional guard that must match the current primary target.
        dry_run:
          type: boolean
          default: true
          description: Defaults to true; set false only with confirm=switch.
        confirm:
          type: string
          description: Must be switch when dry_run is false.
    PrimaryTargetSwitchResponse:
      type: object
      required: [status, mode, resource, path, object_id, previous_target, target, dry_run, effective_now]
      properties:
        status:
          type: string
          enum: [planned, switched, noop]
        mode:
          type: string
          enum: [bucket, site]
        resource:
          type: string
        deployment_id:
          type: string
        path:
          type: string
        file:
          type: string
        object_id:
          type: integer
          format: int64
        previous_target:
          type: string
        target:
          type: string
        dry_run:
          type: boolean
        effective_now:
          type: boolean
        target_url:
          type: string
        target_url_redacted:
          type: boolean
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DoctorCheck"
        warnings:
          type: array
          items:
            type: string
        next_commands:
          type: array
          items:
            type: string
        rollback_command:
          type: string
    CDNDoctorReport:
      type: object
      required: [status, checked_at_utc, bucket, route_profile, checks]
      properties:
        status:
          type: string
        checked_at_utc:
          type: string
          format: date-time
        bucket:
          $ref: "#/components/schemas/AssetBucket"
        route_profile:
          $ref: "#/components/schemas/CDNDoctorRouteProfile"
        path:
          type: string
        public_url:
          type: string
        storage_url:
          type: string
        storage_url_redacted:
          type: boolean
        object:
          $ref: "#/components/schemas/CDNDoctorObject"
        replicas:
          type: array
          items:
            $ref: "#/components/schemas/CDNDoctorReplica"
        ipfs:
          type: array
          items:
            $ref: "#/components/schemas/EdgeManifestIPFS"
        selection:
          $ref: "#/components/schemas/RouteExplainSelection"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/RouteCandidateEvaluation"
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DoctorCheck"
        warnings:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/DoctorRecommendation"
        next_commands:
          type: array
          items:
            type: string
      additionalProperties: true
    CDNDoctorRouteProfile:
      type: object
      properties:
        name:
          type: string
        primary:
          type: string
        backups:
          type: array
          items:
            type: string
        allow_redirect:
          type: boolean
        default_cache_control:
          type: string
        routing_policy:
          type: string
        targets:
          type: array
          items:
            type: string
    CDNDoctorObject:
      type: object
      properties:
        logical_path:
          type: string
        object_id:
          type: integer
          format: int64
        asset_type:
          type: string
        physical_key:
          type: string
        size:
          type: integer
          format: int64
        sha256:
          type: string
        content_type:
          type: string
        cache_control:
          type: string
        route_profile:
          type: string
        primary_target:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CDNDoctorReplica:
      type: object
      properties:
        target:
          type: string
        target_type:
          type: string
        status:
          type: string
        direct_url:
          type: string
        url_redacted:
          type: boolean
        last_error:
          type: string
        updated_at:
          type: string
          format: date-time
        ipfs:
          $ref: "#/components/schemas/EdgeManifestIPFS"
    SiteDoctorReport:
      type: object
      required: [status, checked_at_utc, site, checks]
      properties:
        status:
          type: string
        checked_at_utc:
          type: string
          format: date-time
